<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Makeshift Racers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 900px;
      padding: 40px;
    }

    #lobby h1 {
      font-size: 36px;
      letter-spacing: 2px;
    }

    .vehicle-tabs {
      display: flex;
      gap: 8px;
    }

    .vtab {
      background: #2a2a4a;
      color: #aaa;
      border: 2px solid transparent;
      padding: 8px 24px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .vtab.active {
      background: #4a8fe8;
      color: white;
      border-color: #4a8fe8;
    }

    .vtab:hover:not(.active) {
      border-color: #555;
      color: white;
    }

    .color-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .color-row {
      display: flex;
      gap: 16px;
    }

    .color-swatch {
      width: 72px;
      height: 120px;
      border-radius: 8px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s, opacity 0.2s;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .color-swatch img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
    }

    .color-swatch:hover:not(.taken) {
      transform: scale(1.15);
    }

    .color-swatch.selected {
      border-color: white;
      transform: scale(1.15);
    }

    .color-swatch.taken {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .my-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .car-preview {
      width: 80px;
      height: 140px;
      border: 2px solid #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0d0d1a;
    }

    .car-preview-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
    }

    #nameInput {
      background: #2a2a4a;
      border: 1px solid #555;
      color: white;
      padding: 8px 16px;
      font-size: 16px;
      border-radius: 6px;
      text-align: center;
      width: 200px;
    }

    #nameInput:focus {
      outline: none;
      border-color: #888;
    }

    #readyBtn {
      background: #4a8fe8;
      color: white;
      border: none;
      padding: 10px 40px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #readyBtn:hover {
      background: #3a7fd8;
    }

    #readyBtn.ready {
      background: #4ae87a;
      color: #1a1a2e;
    }

    .players-grid {
      display: flex;
      gap: 24px;
    }

    .player-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 160px;
    }

    .player-car-box {
      width: 160px;
      height: 100px;
      border: 2px solid #444;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
    }

    .player-car-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
    }

    .player-name {
      font-size: 14px;
      color: #aaa;
    }

    .ready-status {
      font-size: 18px;
    }

    .ready-status.ready {
      color: #4ae87a;
    }

    .ready-status.not-ready {
      color: #e84a4a;
    }

    #game {
      display: none;
    }

    #countdown-overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 100;
    }

    #countdown-text {
      font-size: 140px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.5), 0 4px 20px rgba(0, 0, 0, 0.9);
      user-select: none;
      transition: color 0.1s;
    }

    #scoreboard-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      color: white;
      gap: 32px;
    }

    #scoreboard-title {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
      transition: color 0.4s, font-size 0.3s;
    }

    #scoreboard-subtitle {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 1px;
      min-height: 22px;
    }

    #scoreboard-bars {
      display: flex;
      gap: 32px;
      align-items: flex-end;
    }

    .score-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100px;
    }

    .score-total-label {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
    }

    .score-bar-outer {
      width: 60px;
      height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      position: relative;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .score-bar {
      width: 100%;
      position: absolute;
      bottom: 0;
      border-radius: 4px 4px 0 0;
      transition: height 0.5s ease;
    }

    .score-name-label {
      font-size: 14px;
      color: #ddd;
      text-align: center;
    }

    #scoreboard-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #ready-next-btn {
      background: #4ae87a;
      color: #1a1a2e;
      border: none;
      padding: 12px 48px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #ready-next-btn:hover:not(:disabled) {
      background: #3ad46a;
    }

    #ready-next-btn:disabled {
      background: #555;
      color: #999;
      cursor: default;
    }

    #ready-status {
      font-size: 14px;
      color: #aaa;
    }

    #item-hud {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.65);
      border: 2px solid #555;
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      text-align: center;
      min-width: 80px;
      z-index: 50;
    }

    .hud-label {
      font-size: 10px;
      color: #999;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    #item-icon {
      font-size: 15px;
      font-weight: bold;
      min-height: 20px;
    }

    #coin-hud {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.65);
      border: 2px solid #555;
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      text-align: center;
      min-width: 80px;
      z-index: 50;
    }

    #coin-count {
      font-size: 22px;
      font-weight: bold;
    }

    #position-hud {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.65);
      border: 2px solid #555;
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      text-align: center;
      min-width: 80px;
      z-index: 50;
    }

    #position-display {
      font-size: 22px;
      font-weight: bold;
    }

    body.touch-device #coin-hud {
      bottom: auto;
      top: 80px;
    }

    body.touch-device .score-bar-outer {
      height: 110px;
    }

    body.touch-device #scoreboard-overlay {
      gap: 16px;
    }

    body.touch-device #position-hud {
      bottom: auto;
      top: 20px;
    }

    #dpad-left {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
      touch-action: none;
    }

    #dpad-right {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      flex-direction: row;
      gap: 8px;
      z-index: 50;
      touch-action: none;
    }

    #dpad-steer {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    .dpad-btn {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      background: rgba(255,255,255,0.14);
      border: 2px solid rgba(255,255,255,0.28);
      color: white;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn.pressed {
      background: rgba(255,255,255,0.36);
      transform: scale(0.93);
    }

    #btn-use {
      width: 148px;
      height: 50px;
      font-size: 13px;
      letter-spacing: 1px;
      background: rgba(74,143,232,0.55);
      border-color: rgba(74,143,232,0.85);
    }

    #btn-use.pressed {
      background: rgba(74,143,232,0.88);
    }

    #placement-overlay {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      z-index: 100;
      padding: 24px 0;
    }

    #placement-timer {
      font-size: 28px;
      font-weight: bold;
      color: white;
      background: rgba(0, 0, 0, 0.72);
      padding: 10px 28px;
      border-radius: 8px;
      letter-spacing: 1px;
    }

    #placement-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #placement-menu {
      display: none;
      flex-direction: row;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 14px;
      pointer-events: auto;
    }

    .obstacle-item {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s, transform 0.1s;
    }

    .obstacle-item:hover {
      border-color: rgba(255, 255, 255, 0.7);
      transform: scale(1.06);
    }

    .obstacle-item.selected {
      border-color: #4ae87a;
      background: rgba(74, 232, 122, 0.12);
    }

    .obstacle-item.used {
      opacity: 0.35;
      filter: grayscale(1);
      pointer-events: none;
    }

    .obstacle-item img {
      max-width: 58px;
      max-height: 58px;
      object-fit: contain;
    }

    #obstacle-controls {
      display: none;
      flex-direction: row;
      gap: 16px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.78);
      border-radius: 10px;
      pointer-events: auto;
    }

    #obstacle-rotate {
      padding: 12px 28px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4a8fe8;
      color: white;
    }

    #obstacle-confirm {
      padding: 12px 28px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4ae87a;
      color: #1a1a2e;
    }

    #obstacle-confirm:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
      opacity: 0.6;
    }

    #volume-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #volume-label {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
    }

    #volumeSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 160px;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
      cursor: pointer;
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a8fe8;
      cursor: pointer;
    }

    #volumeSlider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a8fe8;
      cursor: pointer;
      border: none;
    }
  </style>
</head>

<body>
  <div id="lobby">
    <h1>Makeshift Racers</h1>

    <div class="vehicle-tabs">
      <button class="vtab active" data-type="f1">F1</button>
      <button class="vtab" data-type="car">Car</button>
      <button class="vtab" data-type="truck">Truck</button>
    </div>

    <div class="color-picker">
      <div class="color-row">
        <div class="color-swatch" data-color="0" id="swatch0"><img src="assets/f1_0.png"></div>
        <div class="color-swatch" data-color="1" id="swatch1"><img src="assets/f1_1.png"></div>
        <div class="color-swatch" data-color="2" id="swatch2"><img src="assets/f1_2.png"></div>
        <div class="color-swatch" data-color="3" id="swatch3"><img src="assets/f1_3.png"></div>
      </div>
      <div class="color-row">
        <div class="color-swatch" data-color="4" id="swatch4"><img src="assets/f1_4.png"></div>
        <div class="color-swatch" data-color="5" id="swatch5"><img src="assets/f1_5.png"></div>
        <div class="color-swatch" data-color="6" id="swatch6"><img src="assets/f1_6.png"></div>
        <div class="color-swatch" data-color="7" id="swatch7"><img src="assets/f1_7.png"></div>
      </div>
    </div>

    <div class="my-setup">
      <div class="car-preview">
        <img id="myPreview" src="" style="display:none; width:100%; height:100%; object-fit:contain;">
      </div>
      <input type="text" id="nameInput" placeholder="Enter name" maxlength="12" />
      <button id="readyBtn">Ready</button>
      <div id="volume-control">
        <span id="volume-label">VOLUME — 50%</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
      </div>
    </div>

    <div class="players-grid">
      <div class="player-slot" id="slot0">
        <div class="player-car-box">
          <img id="car0" src="" style="display:none; height:80px; width:auto; object-fit:contain;">
        </div>
        <div class="player-name" id="pname0">Player 1</div>
        <div class="ready-status not-ready" id="status0">✗ ready</div>
      </div>
      <div class="player-slot" id="slot1">
        <div class="player-car-box">
          <img id="car1" src="" style="display:none; height:80px; width:auto; object-fit:contain;">
        </div>
        <div class="player-name" id="pname1">Player 2</div>
        <div class="ready-status not-ready" id="status1">✗ ready</div>
      </div>
      <div class="player-slot" id="slot2">
        <div class="player-car-box">
          <img id="car2" src="" style="display:none; height:80px; width:auto; object-fit:contain;">
        </div>
        <div class="player-name" id="pname2">Player 3</div>
        <div class="ready-status not-ready" id="status2">✗ ready</div>
      </div>
      <div class="player-slot" id="slot3">
        <div class="player-car-box">
          <img id="car3" src="" style="display:none; height:80px; width:auto; object-fit:contain;">
        </div>
        <div class="player-name" id="pname3">Player 4</div>
        <div class="ready-status not-ready" id="status3">✗ ready</div>
      </div>
    </div>
  </div>

  <div id="game"></div>
  <div id="countdown-overlay"><span id="countdown-text"></span></div>

  <div id="item-hud">
    <div class="hud-label">ITEM</div>
    <div id="item-icon"></div>
  </div>
  <div id="coin-hud">
    <div class="hud-label">COINS</div>
    <span id="coin-count">0</span>
  </div>
  <div id="position-hud">
    <div class="hud-label">POSITION</div>
    <span id="position-display">—</span>
  </div>

  <div id="dpad-left">
    <button class="dpad-btn" id="btn-use">USE</button>
    <div id="dpad-steer">
      <button class="dpad-btn" id="btn-left">&#9664;</button>
      <button class="dpad-btn" id="btn-right">&#9654;</button>
    </div>
  </div>
  <div id="dpad-right">
    <button class="dpad-btn" id="btn-down">&#9660;</button>
    <button class="dpad-btn" id="btn-up">&#9650;</button>
  </div>

  <div id="placement-overlay">
    <div id="placement-timer">Place your obstacle — 15</div>
    <div id="placement-bottom">
      <div id="obstacle-controls">
        <button id="obstacle-rotate" onclick="window.rotatePlacementGhost && window.rotatePlacementGhost()">&#8635; Rotate</button>
        <button id="obstacle-confirm" onclick="window.confirmObstaclePlacement && window.confirmObstaclePlacement()">&#10003; Place</button>
      </div>
      <div id="placement-menu"></div>
    </div>
  </div>

  <div id="scoreboard-overlay">
    <h2 id="scoreboard-title">Round Results</h2>
    <div id="scoreboard-subtitle"></div>
    <div id="scoreboard-bars"></div>
    <div id="scoreboard-footer">
      <button id="ready-next-btn">Play Again</button>
      <div id="ready-status"></div>
    </div>
  </div>

  <script>
    const COLORS = ['#e8c14a', '#4a8fe8', '#4ae87a', '#e84a4a', '#9b4ae8', '#e8874a', '#e84a9b', '#4ae8e8'];
    const HEX_COLORS = [0xe8c14a, 0x4a8fe8, 0x4ae87a, 0xe84a4a, 0x9b4ae8, 0xe8874a, 0xe84a9b, 0x4ae8e8];
    let selectedColor = null;
    let mySlotIndex = null;
    let isReady = false;
    let selectedVehicleType = 'f1';

    function swatchImgSrc(vType, colorIdx) {
      return vType === 'truck' ? 'assets/truck_0.png' : 'assets/' + vType + '_' + colorIdx + '.png';
    }

    function spriteTransform(vType) {
      return vType === 'f1' ? 'rotate(180deg)' : 'none';
    }

    document.querySelectorAll('.vtab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedVehicleType = tab.dataset.type;

        // Deselect color and reset ready when switching type
        selectedColor = null;
        isReady = false;
        const readyBtn = document.getElementById('readyBtn');
        readyBtn.textContent = 'Ready';
        readyBtn.classList.remove('ready');
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected', 'taken'));
        const preview = document.getElementById('myPreview');
        preview.src = '';
        preview.style.display = 'none';

        // Update swatch images to new vehicle type
        document.querySelectorAll('.color-swatch').forEach(swatch => {
          const img = swatch.querySelector('img');
          img.src = swatchImgSrc(selectedVehicleType, swatch.dataset.color);
          img.style.transform = spriteTransform(selectedVehicleType);
        });

        if (window.lobbySocket) {
          window.lobbySocket.send(JSON.stringify({ type: 'lobbyUpdate', color: null, name: document.getElementById('nameInput').value, ready: false, vehicleType: selectedVehicleType }));
        }
      });
    });

    // Set initial F1 rotation on swatch images
    document.querySelectorAll('.color-swatch img').forEach(img => {
      img.style.transform = 'rotate(180deg)';
    });

    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        if (swatch.classList.contains('taken')) return;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        swatch.classList.add('selected');
        selectedColor = parseInt(swatch.dataset.color);
        const preview = document.getElementById('myPreview');
        preview.src = swatchImgSrc(selectedVehicleType, selectedColor);
        preview.style.transform = spriteTransform(selectedVehicleType);
        preview.style.display = 'block';
        if (window.lobbySocket) {
          window.lobbySocket.send(JSON.stringify({ type: 'lobbyUpdate', color: selectedColor, name: document.getElementById('nameInput').value, ready: isReady, vehicleType: selectedVehicleType }));
        }
      });
    });

    document.getElementById('nameInput').addEventListener('input', () => {
      if (window.lobbySocket) {
        window.lobbySocket.send(JSON.stringify({ type: 'lobbyUpdate', color: selectedColor, name: document.getElementById('nameInput').value, ready: isReady, vehicleType: selectedVehicleType }));
      }
    });

    document.getElementById('readyBtn').addEventListener('click', () => {
      if (selectedColor === null) {
        alert('Please pick a color first!');
        return;
      }
      const name = document.getElementById('nameInput').value.trim();
      isReady = !isReady;
      const btn = document.getElementById('readyBtn');
      btn.textContent = isReady ? 'Cancel' : 'Ready';
      btn.classList.toggle('ready', isReady);
      if (isReady && ('ontouchstart' in window)) {
        const el = document.documentElement;
        const reqFs = el.requestFullscreen || el.webkitRequestFullscreen;
        if (reqFs) {
          reqFs.call(el).then(() => {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(() => {});
            }
          }).catch(() => {});
        }
      }
      if (window.lobbySocket) {
        window.lobbySocket.send(JSON.stringify({ type: 'lobbyUpdate', color: selectedColor, name, ready: isReady, vehicleType: selectedVehicleType }));
      }
    });

    const volumeSlider = document.getElementById('volumeSlider');
    const volumeLabel = document.getElementById('volume-label');
    const savedVolume = parseFloat(localStorage.getItem('soundVolume') ?? '0.5');
    volumeSlider.value = savedVolume;
    volumeLabel.textContent = 'VOLUME — ' + Math.round(savedVolume * 100) + '%';
    volumeSlider.addEventListener('input', () => {
      const v = parseFloat(volumeSlider.value);
      volumeLabel.textContent = 'VOLUME — ' + Math.round(v * 100) + '%';
      localStorage.setItem('soundVolume', v);
      if (window.gameScene) window.gameScene.sound.volume = v;
    });

    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const lobbySocket = new WebSocket(protocol + '//' + location.host);
    window.lobbySocket = lobbySocket;

    lobbySocket.onopen = () => {
      lobbySocket.send(JSON.stringify({ type: 'lobbyJoin' }));
    };

    lobbySocket.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'init') {
        window.lobbySessionId = data.sessionId;
      }

      if (data.type === 'lobbySlotIndex') {
        mySlotIndex = data.index;
      }

      if (data.type === 'gameStart') {
        startGame();
      }

      if (data.type === 'lobbyState') {
        const slots = data.slots;
        const takenColors = slots.filter(s => s && s.color !== null && (s.vehicleType || 'f1') === selectedVehicleType).map(s => s.color);

        document.querySelectorAll('.color-swatch').forEach(swatch => {
          const c = parseInt(swatch.dataset.color);
          const isMine = c === selectedColor;
          const isTaken = takenColors.includes(c) && !isMine;
          swatch.classList.toggle('taken', isTaken);
        });

        // if our color got taken by someone else, deselect
        if (selectedColor !== null && !isReady && mySlotIndex !== null) {
          if (slots[mySlotIndex]?.color !== selectedColor) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
            selectedColor = null;
            const p = document.getElementById('myPreview');
            p.src = '';
            p.style.display = 'none';
          }
        }

        slots.forEach((slot, i) => {
          const car = document.getElementById('car' + i);
          const pname = document.getElementById('pname' + i);
          const status = document.getElementById('status' + i);
          if (slot) {
            if (slot.color !== null) {
              const svt = slot.vehicleType || 'f1';
              car.src = swatchImgSrc(svt, slot.color);
              car.style.transform = spriteTransform(svt);
              car.style.display = 'block';
            } else {
              car.src = '';
              car.style.display = 'none';
            }
            pname.textContent = slot.name;
            status.textContent = slot.ready ? '✓ ready' : '✗ ready';
            status.className = 'ready-status ' + (slot.ready ? 'ready' : 'not-ready');
          } else {
            car.src = '';
            car.style.display = 'none';
            pname.textContent = 'Player ' + (i + 1);
            status.textContent = '✗ ready';
            status.className = 'ready-status not-ready';
          }
        });

        const connected = slots.filter(s => s);
        if (connected.length >= 2 && connected.every(s => s.ready)) {
          startGame();
        }
      }

      if (data.type === 'lobbyFull') {
        alert('Room is full!');
        lobbySocket.close();
      }
    };

    function startGame() {
      const name = document.getElementById('nameInput').value.trim();
      window.playerName = name;
      window.playerColorIndex = selectedColor;
      window.playerHexColor = HEX_COLORS[selectedColor];
      window.vehicleType = selectedVehicleType;
      window.gameSocket = lobbySocket;
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game').style.display = 'block';

      const scripts = [
        'node_modules/phaser/dist/phaser.min.js',
        'track.js', 'indicators.js', 'powerups.js', 'scoreboard.js', 'network.js', 'mobile-controls.js', 'game.js'
      ];

      function loadScript(i) {
        if (i >= scripts.length) return;
        const s = document.createElement('script');
        s.src = scripts[i];
        s.onload = () => loadScript(i + 1);
        document.body.appendChild(s);
      }
      loadScript(0);
    }
  </script>
</body>

</html>
